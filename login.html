<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.png" type="image/png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal | boring project.</title>
  <meta name="description" content="boring project. client portal. Access your dashboard and performance reports.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.location.href.indexOf('#') !== -1) {
      history.replaceState(null, null, window.location.pathname);
    }
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --blue: #2B5FA6;
      --gold: #C4922A;
      --white: #F5F5F3;
      --muted: #888780;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    a { text-decoration: none; color: inherit; }

    .portal-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .portal-logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--white);
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .portal-logo span { color: var(--gold); }

    .portal-tagline {
      font-size: 11px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    .portal-heading {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .portal-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .portal-btn {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 14px 20px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      letter-spacing: 0.02em;
    }

    .portal-btn:hover { opacity: 0.88; }

    .portal-footer-text {
      margin-top: 32px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .portal-footer-text a {
      color: var(--white);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .portal-footer-text a:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    .portal-divider {
      width: 100%;
      height: 0.5px;
      background: rgba(255,255,255,0.07);
      margin: 48px 0 0;
    }

    /* Hide the default Netlify Identity widget */
    [data-netlify-identity-menu] { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 36px 20px; }
      .portal-heading { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="portal-wrap">
    <a href="index.html" class="portal-logo">boring project<span>.</span></a>
    <p class="portal-tagline">Finally found.</p>
    <h1 class="portal-heading">Client Portal</h1>
    <p class="portal-sub">Access your dashboard<br>and performance reports.</p>
    <button class="portal-btn" id="loginBtn">Log in</button>
    <p class="portal-footer-text">
      Don't have access yet?<br>
      <a href="contact.html">Contact boring project.</a>
    </p>
    <div class="portal-divider"></div>
  </div>

  <script>
    netlifyIdentity.on('init', user => {
      if (user) {
        window.location.replace('/portal-dashboard.html');
      }
    });

    netlifyIdentity.on('login', () => {
      window.location.replace('/portal-dashboard.html');
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
      netlifyIdentity.open('login');
    });
  </script>

</body>
</html>
